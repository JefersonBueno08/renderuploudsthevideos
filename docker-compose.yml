services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: youtube_automation
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/youtube_automation
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_DIR: /data
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - storage:/data

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/youtube_automation
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_DIR: /data
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
    volumes:
      - storage:/data

volumes:
  pgdata:
  storage:

